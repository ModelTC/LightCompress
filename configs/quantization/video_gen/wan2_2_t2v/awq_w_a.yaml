base:
    seed: &seed 42
model:
    type: Wan2T2V
    path: /mnt/lm_data_afs/wangzining/charles/lab/llmc/model/Wan2.2-T2V-A14B-Diffusers
    torch_dtype: auto
calib:
    name: t2v
    download: False
    path: ./assets/wan_t2v/calib/
    sample_steps: 20  
    bs: 1
    target_height: 480 
    target_width: 832
    num_frames: 81  
    guidance_scale: 5.0
    seed: *seed
eval:
    eval_pos: [transformed, fake_quant]
    type: video_gen
    name: t2v
    download: False
    path: ./assets/wan_t2v/calib/
    bs: 1
    target_height: 480
    target_width: 832
    num_frames: 81
    guidance_scale: 5.0
    output_video_path: ./output_videos_awq/
    inference_per_block: True
quant:
    video_gen:
        method: Awq
        weight:
            # quant_type: int-quant
            quant_type: hif4
            bit: 4
            symmetric: True
            granularity: per_channel
            group_size: -1
        act:
            # quant_type: int-qu
            quant_type: hif4
            bit: 4
            symmetric: True
            granularity: per_token
        special:
            trans: True
            trans_version: v2
            weight_clip: True
            clip_sym: True
save:
    save_lightx2v: True
    save_path: ./save_for_lightx2v/wan2_2_t2v/awq_w_a/original/
