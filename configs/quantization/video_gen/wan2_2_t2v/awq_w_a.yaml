base:
    seed: &seed 42
model:
    type: Wan2T2V
    path: /path/to/wan_t2v
    torch_dtype: auto
    use_cpu_to_save_cuda_mem_for_catcher: True
calib:
    name: t2v
    download: False
    path: ./assets/wan_t2v/calib/
    sample_steps: 20
    bs: 1
    target_height: 480
    target_width: 832
    num_frames: 81
    guidance_scale: 4.0
    guidance_scale_2: 3.0
    seed: *seed
eval:
    eval_pos: []
    type: video_gen
    name: t2v
    download: False
    path: ./assets/wan_t2v/calib/
    bs: 1
    target_height: 480
    target_width: 832
    num_frames: 81
    guidance_scale: 4.0
    guidance_scale_2: 3.0
    output_video_path: ./output_videos_awq/
quant:
    video_gen:
        method: Awq
        weight:
            quant_type: int-quant
            bit: 4
            symmetric: True
            granularity: per_channel
            group_size: -1
        act:
            quant_type: int-quant
            bit: 4
            symmetric: True
            granularity: per_token
        special:
            trans: True
            trans_version: v2
            weight_clip: True
            clip_sym: True
save:
    save_lightx2v: True
    save_path: /path/to/x2v/
