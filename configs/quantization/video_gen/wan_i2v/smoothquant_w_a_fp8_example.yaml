# Wan2.1 I2V FP8 量化配置示例
# 这是一个快速开始的配置文件，请根据实际情况修改路径

base:
    seed: &seed 42

model:
    type: WanI2V
    path: /path/to/wan2.1-i2v-model  # 修改为你的 Wan2.1 I2V 模型路径
    torch_dtype: auto

calib:
    name: i2v
    download: False
    path: /path/to/calibration/data  # 修改为你的校准数据路径
    sample_steps: 40
    bs: 1
    target_height: 480
    target_width: 832
    num_frames: 81
    guidance_scale: 5.0
    seed: *seed

eval:
    eval_pos: [fake_quant]
    type: video_gen
    name: i2v
    download: False
    path: /path/to/eval/data  # 修改为你的评估数据路径
    bs: 1
    target_height: 480
    target_width: 832
    num_frames: 81
    guidance_scale: 5.0
    output_video_path: ./output_videos_fp8/

quant:
    video_gen:
        method: SmoothQuant
        weight:
            quant_type: float-quant
            bit: e4m3  # FP8 E4M3 格式
            symmetric: True
            granularity: per_channel
            use_qtorch: True
        act:
            quant_type: float-quant
            bit: e4m3  # FP8 E4M3 格式
            symmetric: True
            granularity: per_token
            use_qtorch: True
        special:
            alpha: 0.75  # SmoothQuant 平衡参数，范围 0.5-1.0

save:
    save_lightx2v: True  # 保存为 lightx2v 兼容格式
    save_path: /path/to/save/quantized/model  # 修改为你的保存路径
