base:
    seed: &seed 42
model:
    type: WanI2V
    path: /mnt/lm_data_afs/wangzining/charles/lab/llmc/models/Wan2.2-T2V-A14B/
    torch_dtype: auto
calib:
    name: i2v
    download: False
    path: ../assets/wan_i2v/calib/
    sample_steps: 40
    bs: 1
    target_height: 480
    target_width: 832
    num_frames: 81
    guidance_scale: 5.0
    seed: *seed
eval:
    eval_pos: [fake_quant]
    type: video_gen
    name: i2v
    download: False
    path: ../assets/wan_i2v/eval/
    bs: 1
    target_height: 480
    target_width: 832
    num_frames: 81
    guidance_scale: 5.0
    output_video_path: ./output_videos_awq/
quant:
    video_gen:
        method: Awq
        weight:
            bit: 4
            symmetric: True
            granularity: per_channel
            group_size: -1
        act:
            bit: 4
            symmetric: True
            granularity: per_token
        special:
            trans: True
            trans_version: v2
            weight_clip: False
            clip_sym: True
save:
    save_lightx2v: True
    save_path: ../lightx2v/wan_i2v_awq_w_a/x2v/
